<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="Daytime ice making and nighttime air cooling">
  <rect x="10" y="10" width="300" height="180" rx="12" fill="#1c2128" stroke="#f0b429" stroke-width="2"/>
  <text x="160" y="40" text-anchor="middle" fill="#f0b429" font-family="Inter,sans-serif" font-size="14" font-weight="700">Day - Store cooling</text>
  <circle cx="60" cy="90" r="24" fill="#f0b429" opacity="0.3"/>
  <text x="160" y="85" text-anchor="middle" fill="#f0f6fc" font-family="Inter,sans-serif" font-size="12">PV to DC compressor</text>
  <text x="160" y="105" text-anchor="middle" fill="#8b949e" font-family="Inter,sans-serif" font-size="11">Water freezes into ice</text>
  <rect x="100" y="125" width="120" height="40" rx="6" fill="#21262d" stroke="#f0c14b"/>
  <text x="160" y="150" text-anchor="middle" fill="#f0c14b" font-family="Inter,sans-serif" font-size="12" font-weight="600">Ice tank charging</text>
  <rect x="330" y="10" width="300" height="180" rx="12" fill="#1c2128" stroke="#e6b422" stroke-width="2"/>
  <text x="480" y="40" text-anchor="middle" fill="#e6b422" font-family="Inter,sans-serif" font-size="14" font-weight="700">Night - Deliver cooling</text>
  <text x="480" y="85" text-anchor="middle" fill="#f0f6fc" font-family="Inter,sans-serif" font-size="12">Small battery, DC air pump</text>
  <text x="480" y="105" text-anchor="middle" fill="#8b949e" font-family="Inter,sans-serif" font-size="11">Air through copper coil in ice</text>
  <path d="M400 130 Q480 110 560 130" fill="none" stroke="#e6b422" stroke-width="2"/>
  <text x="480" y="150" text-anchor="middle" fill="#e6b422" font-family="Inter,sans-serif" font-size="12" font-weight="600">Cooled air to space</text>
</svg>
